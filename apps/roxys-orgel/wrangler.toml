"$schema" = "node_modules/wrangler/config-schema.json"

name = "roxys-orgel"
compatibility_date = "2025-06-02"
main = "./src/main.tsx"
compatibility_flags = ["nodejs_compat_v2"]
workers_dev = true

[observability]
enabled = false

[[d1_databases]]
binding = "DB"
database_name = "roxys-orgel"
database_id = "PLACEHOLDER"
migrations_dir = "../../drizzle"

[[kv_namespaces]]
binding = "KV"
id = "PLACEHOLDER"
