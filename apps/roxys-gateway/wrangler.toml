"$schema" = "node_modules/wrangler/config-schema.json"

account_id = "1766f35ec0dc9e97a6f153e46dbec6ba"
name = "roxys-gateway"
compatibility_date = "2025-06-02"
main = "./src/main.ts"
compatibility_flags = ["nodejs_compat_v2"]
workers_dev = true

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[[routes]]
pattern = "pan.roxylib.com/*"
zone_id = "9e79eceb9f768792ff24ce075c3d88a9"

[[routes]]
pattern = "book.roxylib.com/*"
zone_id = "9e79eceb9f768792ff24ce075c3d88a9"

[[routes]]
pattern = "assets.roxylib.com/*"
zone_id = "9e79eceb9f768792ff24ce075c3d88a9"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "roxylib"
